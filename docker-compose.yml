version: '3.8'

services:
  app:
    build: .
    container_name: automaster-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8000
      - TZ=Europe/Moscow
      - DATABASE_ENABLED=true
      - DATABASE_URL=postgresql://automaster:automaster@db:5432/automaster
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - automaster-network

  db:
    image: postgres:16-alpine
    container_name: automaster-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=automaster
      - POSTGRES_PASSWORD=automaster
      - POSTGRES_DB=automaster
      - TZ=Europe/Moscow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automaster-network

  redis:
    image: redis:7-alpine
    container_name: automaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automaster-network

  nginx:
    image: nginx:alpine
    container_name: automaster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - automaster-network

networks:
  automaster-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: