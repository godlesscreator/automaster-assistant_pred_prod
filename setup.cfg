[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Coverage
addopts = -v --cov=bot_assistant --cov-report=term-missing --cov-report=html:coverage_report

# Asyncio
asyncio_mode = auto

# Маркеры
markers =
    slow: медленные тесты (интеграционные)
    unit: модульные тесты
    integration: интеграционные тесты